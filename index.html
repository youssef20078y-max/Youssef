<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنتاج المحاصيل - كلية الزراعة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #1a3a2a;
  --green-mid: #2d6a4f;
  --green-light: #52b788;
  --green-pale: #95d5b2;
  --gold: #d4a017;
  --gold-light: #f0c040;
  --cream: #fefae0;
  --cream-dark: #f5e6c8;
  --brown: #6b3d14;
  --text-dark: #1a1a1a;
  --text-mid: #3a3a3a;
  --white: #ffffff;
  --shadow: rgba(26,58,42,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--green-dark);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== BACKGROUND ========== */
.bg-pattern {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(82,183,136,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(212,160,23,0.08) 0%, transparent 50%),
    linear-gradient(160deg, #0d2118 0%, #1a3a2a 40%, #0f2d1c 100%);
}
.bg-pattern::before {
  content:'';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(82,183,136,0.04) 40px, rgba(82,183,136,0.04) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(82,183,136,0.04) 40px, rgba(82,183,136,0.04) 41px);
}

/* ========== SCREENS ========== */
.screen { display:none; position:relative; z-index:1; min-height:100vh; }
.screen.active { display:flex; }

/* ========== LOGIN SCREEN ========== */
#loginScreen {
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: rgba(254,250,224,0.97);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,160,23,0.3);
  animation: slideUp 0.6s ease;
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(30px); }
  to { opacity:1; transform: translateY(0); }
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .icon {
  font-size: 64px;
  display: block;
  margin-bottom: 12px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.login-logo h1 {
  font-family: 'Amiri', serif;
  font-size: 26px;
  color: var(--green-dark);
  font-weight: 700;
}
.login-logo p {
  color: var(--green-mid);
  font-size: 14px;
  margin-top: 4px;
}

.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 8px;
  font-size: 15px;
}
.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid rgba(45,106,79,0.25);
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  background: white;
  color: var(--text-dark);
  transition: all 0.3s;
  direction: rtl;
}
.form-group input:focus {
  outline: none;
  border-color: var(--green-mid);
  box-shadow: 0 0 0 4px rgba(45,106,79,0.12);
}

.btn-login {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(45,106,79,0.4);
}
.btn-login:active { transform: translateY(0); }

.login-note {
  text-align: center;
  margin-top: 16px;
  font-size: 12px;
  color: #888;
}

/* ========== MAIN APP ========== */
#appScreen {
  flex-direction: column;
}

/* NAV */
.nav {
  background: rgba(13,33,24,0.97);
  backdrop-filter: blur(20px);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky; top:0; z-index:100;
  border-bottom: 1px solid rgba(82,183,136,0.2);
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  color: var(--cream);
  font-family: 'Amiri', serif;
  font-size: 18px;
  font-weight: 700;
}
.nav-brand span { font-size: 24px; }

.nav-tabs {
  display: flex; gap: 4px;
}
.nav-tab {
  padding: 8px 16px;
  border: none;
  background: transparent;
  color: rgba(254,250,224,0.6);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s;
  white-space: nowrap;
}
.nav-tab:hover { background: rgba(82,183,136,0.15); color: var(--green-pale); }
.nav-tab.active {
  background: var(--green-mid);
  color: white;
}
.nav-user {
  color: var(--gold-light);
  font-size: 13px;
  font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.nav-user .logout-btn {
  background: rgba(255,255,255,0.1);
  border: none;
  color: rgba(255,255,255,0.6);
  padding: 4px 10px;
  border-radius: 6px;
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-user .logout-btn:hover { background: rgba(255,100,100,0.2); color: #ff8888; }

/* PAGE CONTENT */
.page { display:none; flex:1; }
.page.active { display:block; }

/* ========== STUDY PAGE ========== */
#studyPage {
  padding: 32px 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.page-header {
  text-align: center;
  margin-bottom: 40px;
}
.page-header h2 {
  font-family: 'Amiri', serif;
  font-size: 32px;
  color: var(--cream);
  margin-bottom: 8px;
}
.page-header p { color: var(--green-pale); font-size: 15px; }

.crops-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 24px;
}

.crop-card {
  background: rgba(254,250,224,0.97);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 32px var(--shadow);
  transition: transform 0.3s, box-shadow 0.3s;
  animation: fadeIn 0.5s ease both;
}
@keyframes fadeIn {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}
.crop-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.3);
}

.crop-header {
  background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.crop-emoji { font-size: 36px; }
.crop-title h3 {
  font-family: 'Amiri', serif;
  font-size: 20px;
  color: var(--gold-light);
  margin-bottom: 2px;
}
.crop-title .sci-name {
  font-style: italic;
  color: rgba(254,250,224,0.7);
  font-size: 12px;
}
.crop-title .eng-name {
  color: var(--green-pale);
  font-size: 12px;
  margin-top: 2px;
}

.crop-body { padding: 20px 24px; }

.info-section { margin-bottom: 16px; }
.info-section h4 {
  color: var(--green-dark);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--green-pale);
  display: flex; align-items: center; gap: 6px;
}
.info-section ul {
  list-style: none;
  padding: 0;
}
.info-section ul li {
  padding: 4px 0;
  font-size: 13px;
  color: var(--text-mid);
  display: flex; align-items: flex-start; gap: 6px;
  line-height: 1.6;
}
.info-section ul li::before {
  content: '◆';
  color: var(--green-light);
  font-size: 8px;
  margin-top: 5px;
  flex-shrink: 0;
}

.family-badge {
  display: inline-block;
  background: var(--green-dark);
  color: var(--gold-light);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 12px;
}

/* ========== TABLE PAGE ========== */
#tablePage {
  padding: 24px;
}
.table-container {
  max-width: 100%;
  overflow-x: auto;
}
.comparison-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: rgba(254,250,224,0.97);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  font-size: 12px;
}
.comparison-table thead tr th {
  background: linear-gradient(135deg, var(--green-dark), #0d4a2e);
  color: var(--gold-light);
  padding: 14px 12px;
  text-align: center;
  font-weight: 700;
  font-size: 13px;
  border-bottom: 2px solid var(--gold);
  white-space: nowrap;
  position: sticky; top: 0;
}
.comparison-table thead tr th:first-child {
  text-align: right;
  min-width: 120px;
}
.comparison-table tbody tr {
  transition: background 0.2s;
}
.comparison-table tbody tr:nth-child(even) {
  background: rgba(149,213,178,0.1);
}
.comparison-table tbody tr:hover {
  background: rgba(82,183,136,0.15);
}
.comparison-table tbody tr td {
  padding: 12px 10px;
  border-bottom: 1px solid rgba(45,106,79,0.1);
  vertical-align: top;
  line-height: 1.6;
  text-align: center;
  color: var(--text-mid);
  font-size: 12px;
}
.comparison-table tbody tr td:first-child {
  text-align: right;
  font-weight: 700;
  color: var(--green-dark);
  background: rgba(45,106,79,0.08);
  white-space: nowrap;
}
.crop-name-cell {
  display: flex; flex-direction: column; gap: 2px;
}
.crop-name-cell .ar { font-size: 14px; font-weight: 700; color: var(--green-dark); }
.crop-name-cell .sci { font-size: 10px; font-style: italic; color: #888; }

/* ========== QUIZ PAGES ========== */
#quizPage, #tfPage {
  padding: 24px;
  max-width: 800px;
  margin: 0 auto;
}
.quiz-header {
  text-align: center;
  margin-bottom: 28px;
}
.quiz-header h2 {
  font-family: 'Amiri', serif;
  font-size: 28px;
  color: var(--cream);
}
.quiz-progress {
  background: rgba(0,0,0,0.3);
  border-radius: 20px;
  height: 8px;
  margin: 16px 0;
  overflow: hidden;
}
.quiz-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--green-light), var(--gold-light));
  border-radius: 20px;
  transition: width 0.4s ease;
}
.quiz-counter {
  color: var(--green-pale);
  font-size: 14px;
  margin-top: 8px;
}

.question-card {
  background: rgba(254,250,224,0.97);
  border-radius: 20px;
  padding: 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  animation: slideIn 0.4s ease;
}
@keyframes slideIn {
  from { opacity:0; transform: translateX(20px); }
  to { opacity:1; transform: translateX(0); }
}
.question-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 24px;
  line-height: 1.7;
}
.options-list { list-style: none; }
.option-item {
  margin-bottom: 12px;
}
.option-btn {
  width: 100%;
  padding: 14px 20px;
  border: 2px solid rgba(45,106,79,0.2);
  border-radius: 12px;
  background: white;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  color: var(--text-dark);
  cursor: pointer;
  text-align: right;
  transition: all 0.2s;
  direction: rtl;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--green-mid);
  background: rgba(82,183,136,0.08);
  transform: translateX(-4px);
}
.option-btn.correct {
  background: rgba(82,183,136,0.2);
  border-color: var(--green-mid);
  color: var(--green-dark);
  font-weight: 700;
}
.option-btn.wrong {
  background: rgba(220,80,80,0.12);
  border-color: #dc5050;
  color: #a00;
}

.explanation-box {
  margin-top: 20px;
  padding: 16px 20px;
  background: rgba(212,160,23,0.1);
  border: 1px solid var(--gold);
  border-radius: 12px;
  font-size: 14px;
  color: var(--brown);
  line-height: 1.7;
  display: none;
}
.explanation-box.show { display: block; animation: fadeIn 0.3s ease; }
.explanation-box strong { color: var(--green-dark); }

.btn-next {
  display: none;
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-next.show { display: block; animation: fadeIn 0.3s ease; }
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,79,0.4); }

/* T/F buttons */
.tf-buttons {
  display: flex;
  gap: 16px;
  margin-top: 20px;
}
.tf-btn {
  flex: 1;
  padding: 18px;
  border: 2px solid transparent;
  border-radius: 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
.tf-btn.true-btn {
  background: rgba(82,183,136,0.15);
  border-color: var(--green-light);
  color: var(--green-dark);
}
.tf-btn.false-btn {
  background: rgba(220,80,80,0.1);
  border-color: #dc5050;
  color: #a00;
}
.tf-btn:hover:not(:disabled) { transform: scale(1.03); }
.tf-btn.correct { background: rgba(82,183,136,0.35) !important; border-color: var(--green-mid) !important; }
.tf-btn.wrong { background: rgba(220,80,80,0.3) !important; border-color: #dc5050 !important; }

/* Result Screen */
.result-screen {
  text-align: center;
  padding: 48px 32px;
  background: rgba(254,250,224,0.97);
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
.result-score {
  font-size: 80px;
  font-weight: 900;
  color: var(--green-mid);
  line-height: 1;
}
.result-screen h3 {
  font-family: 'Amiri', serif;
  font-size: 28px;
  color: var(--green-dark);
  margin: 16px 0 8px;
}
.result-screen p { color: #666; font-size: 15px; }
.btn-restart {
  margin-top: 24px;
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,79,0.4); }

/* Mobile nav */
@media (max-width: 640px) {
  .nav { padding: 0 12px; height: auto; flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
  .nav-tabs { width: 100%; overflow-x: auto; padding-bottom: 4px; }
  .nav-tab { font-size: 11px; padding: 6px 10px; }
  .nav-brand { font-size: 14px; }
  .login-card { padding: 32px 24px; }
  .crops-grid { grid-template-columns: 1fr; }
  #studyPage, #quizPage, #tfPage { padding: 16px; }
  .question-text { font-size: 16px; }
}
</style>
</head>
<body>

<div class="bg-pattern"></div>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🌾</span>
      <h1>إنتاج المحاصيل</h1>
      <p>كلية الزراعة · د. محمود عزب</p>
    </div>
    <div class="form-group">
      <label>👤 الاسم الكامل</label>
      <input type="text" id="nameInput" placeholder="أدخل اسمك..." />
    </div>
    <div class="form-group">
      <label>📱 رقم الهاتف</label>
      <input type="tel" id="phoneInput" placeholder="01xxxxxxxxx" />
    </div>
    <button class="btn-login" onclick="handleLogin()">دخول الموقع 🚀</button>
    <p class="login-note">سيتم حفظ بياناتك تلقائياً</p>
    <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--green-mid);font-weight:700;letter-spacing:0.5px;">By: Eng Youssef Ibrahim</p>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="appScreen" class="screen">
  <nav class="nav">
    <div class="nav-brand"><span>🌾</span> إنتاج المحاصيل</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('studyPage', this)">📚 الشرح</button>
      <button class="nav-tab" onclick="showPage('quizPage', this); openQuiz()">❓ اختياري</button>
      <button class="nav-tab" onclick="showPage('tfPage', this); openTF()">✅ صح/غلط</button>
    </div>
    <div class="nav-user">
      <span id="userDisplay">👤</span>
      <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
  </nav>

  <!-- ===== STUDY PAGE ===== -->
  <div id="studyPage" class="page active">
    <div style="padding:32px 24px; max-width:1200px; margin:0 auto;">
      <div class="page-header">
        <h2>🌿 الوصف النباتي للمحاصيل</h2>
        <p>By Youssef Ibrahim</p>
        <p style="margin-top:10px;font-size:13px;color:var(--gold-light);font-weight:700;">By: Eng Youssef Ibrahim</p>
      </div>
      <div class="crops-grid" id="cropsGrid"></div>
    </div>
  </div>

  <!-- ===== QUIZ PAGE ===== -->
  <div id="quizPage" class="page">
    <div class="quiz-header">
      <h2>❓ أسئلة اختيار من متعدد</h2>
      <p style="color:var(--gold-light);font-size:13px;font-weight:700;margin-bottom:8px;">By: Eng Youssef Ibrahim</p>
      <div class="quiz-progress"><div class="quiz-progress-bar" id="quizBar"></div></div>
      <div class="quiz-counter" id="quizCounter"></div>
    </div>
    <div id="quizContainer"></div>
  </div>

  <!-- ===== T/F PAGE ===== -->
  <div id="tfPage" class="page">
    <div class="quiz-header">
      <h2>✅ أسئلة صح وغلط</h2>
      <p style="color:var(--gold-light);font-size:13px;font-weight:700;margin-bottom:8px;">By: Eng Youssef Ibrahim</p>
      <div class="quiz-progress"><div class="quiz-progress-bar" id="tfBar"></div></div>
      <div class="quiz-counter" id="tfCounter"></div>
    </div>
    <div id="tfContainer"></div>
  </div>

</div>

<script>
// ==================== DATA ====================
const CROPS = [
  {
    name: 'الذرة الشامية',
    emoji: '🌽',
    sci: 'Zea mays L.',
    eng: 'Maize / Corn',
    family: 'Gramineae (النجيلية)',
    root: [
      'جذور جنينية: يظهر الجذير أولاً ثم يتبعه جذور أخرى ليصل عددها إلى 4، تمتص الماء والغذاء مبكراً وتتميز بشدة التفرع.',
      'جذور عرضية (Crown roots): تنشأ من العقد السفلى للساق تحت سطح الأرض (على بعد 2-3 سم من السطح) وتخرج في محيطات.',
      'جذور دعامية (Aerial roots): تنشأ من العقد فوق سطح الأرض، وظيفتها تدعيم النبات ومنع الرقاد وامتصاص الغذاء عند وصولها للتربة.',
    ],
    stem: [
      'ساق قائمة مصمتة ممتلئة بالنخاع، مقسمة لعقد وسلاميات.',
      'السلاميات تكون قصيرة عند القاعدة وتزداد في الطول تدريجياً نحو الأعلى.',
    ],
    leaves: [
      'تخرج ورقة واحدة عند كل عقدة بترتيب متبادل في صفين.',
      'تتكون من: نصل شريطي طويل، غمد يغلف الساق تماماً، ولسين (زائدة غشائية عند التقاء النصل بالغمد).',
    ],

// ==================== LOGIN ====================
function handleLogin() {
  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  if (!name || !phone) {
    alert('من فضلك أدخل الاسم ورقم الهاتف');
    return;
  }
  if (phone.length < 10) {
    alert('رقم الهاتف غير صحيح');
    return;
  }

  // Save user
  const user = { name, phone, loginTime: new Date().toISOString() };
  localStorage.setItem('cropUser', JSON.stringify(user));

  // Send to Gmail via Web3Forms
  sendNotification(user);
  enterApp(user);
}

async function sendNotification(user) {
  try {
    const fd = new FormData();
    fd.append('access_key', 'abe98334-05c2-4a23-9f40-bf8f1781559e');
    fd.append('subject', 'مستخدم جديد — موقع إنتاج المحاصيل');
    fd.append('from_name', 'موقع إنتاج المحاصيل');
    fd.append('name', user.name);
    fd.append('email', 'yi069312@gmail.com');
    fd.append('message', `مستخدم جديد سجّل دخوله:\nالاسم: ${user.name}\nالهاتف: ${user.phone}\nالوقت: ${new Date().toLocaleString('ar-EG')}`);
    await fetch('https://api.web3forms.com/submit', { method: 'POST', body: fd });
  } catch(e) { /* silent */ }
}

function enterApp(user) {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('userDisplay').textContent = '👤 ' + user.name.split(' ')[0];
  buildCrops();
}

function logout() {
  if (confirm('هتخرج من الموقع؟')) {
    localStorage.removeItem('cropUser');
    document.getElementById('appScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
  }
}

// Check if already logged in
window.addEventListener('load', () => {
  const saved = localStorage.getItem('cropUser');
  if (saved) {
    const user = JSON.parse(saved);
    enterApp(user);
  }
});

// ==================== NAVIGATION ====================
function showPage(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  btn.classList.add('active');
}

// Back button handling
let pageHistory = ['studyPage'];
window.addEventListener('popstate', (e) => {
  const tabs = document.querySelectorAll('.nav-tab');
  const pages = ['studyPage','quizPage','tfPage'];
  const currentPage = [...document.querySelectorAll('.page')].find(p => p.classList.contains('active'));
  if (currentPage && currentPage.id !== 'studyPage') {
    history.pushState(null, '');
    const idx = pages.indexOf(currentPage.id);
    const prevIdx = Math.max(0, idx - 1);
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pages[0]).classList.add('active');
    tabs[0].classList.add('active');
  }
});
history.pushState(null, '');

// ==================== BUILD STUDY CARDS ====================
function buildCrops() {
  const grid = document.getElementById('cropsGrid');
  grid.innerHTML = '';
  CROPS.forEach((crop, i) => {
    const card = document.createElement('div');
    card.className = 'crop-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="crop-header">
        <span class="crop-emoji">${crop.emoji}</span>
        <div class="crop-title">
          <h3>${crop.name}</h3>
          <div class="sci-name">${crop.sci}</div>
          <div class="eng-name">${crop.eng}</div>
        </div>
      </div>
      <div class="crop-body">
        <div class="family-badge">🏷️ ${crop.family}</div>
        ${section('🌱 الجذر', crop.root)}
        ${section('🌿 الساق', crop.stem)}
        ${section('🍃 الأوراق', crop.leaves)}
        ${section('🌸 الأزهار (النورة)', crop.flowers)}
        <div class="info-section">
          <h4>💛 التلقيح</h4>
          <ul><li>${crop.pollination}</li></ul>
        </div>
        <div class="info-section">
          <h4>🔢 أرقام مهمة</h4>
          <ul><li>${crop.numbers}</li></ul>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function section(title, items) {
  return `<div class="info-section"><h4>${title}</h4><ul>${items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
}

// ==================== BUILD TABLE ====================
function buildTable() {
  const table = document.getElementById('compTable');
  const cols = ['النبات', 'الجذر', 'الساق', 'الأوراق', 'الأزهار/النورة', 'التلقيح', 'الاسم العلمي', 'العائلة', 'الاسم الإنجليزي', 'أرقام مهمة'];
  table.innerHTML = `<thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>`;
  const tbody = document.createElement('tbody');
  CROPS.forEach(crop => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="crop-name-cell"><span class="ar">${crop.emoji} ${crop.name}</span></div></td>
      <td style="text-align:right">${crop.root.slice(0,2).join('<br>')}</td>
      <td style="text-align:right">${crop.stem.slice(0,2).join('<br>')}</td>
      <td style="text-align:right">${crop.leaves.slice(0,2).join('<br>')}</td>
      <td style="text-align:right">${crop.flowers.slice(0,2).join('<br>')}</td>
      <td>${crop.pollination}</td>
      <td><em style="font-size:11px">${crop.sci}</em></td>
      <td>${crop.family}</td>
      <td style="font-size:11px">${crop.eng}</td>
      <td style="text-align:right;font-size:11px">${crop.numbers}</td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}

// ==================== QUIZ ENGINE ====================
let quizIndex = 0, quizScore = 0, quizAnswered = false;

function saveQuizProgress() {
  localStorage.setItem('quizProgress', JSON.stringify({ quizIndex, quizScore }));
}

function loadQuizProgress() {
  const saved = localStorage.getItem('quizProgress');
  return saved ? JSON.parse(saved) : null;
}

function clearQuizProgress() {
  localStorage.removeItem('quizProgress');
}

function openQuiz() {
  const saved = loadQuizProgress();
  if (saved && saved.quizIndex > 0 && saved.quizIndex < QUESTIONS.length) {
    document.getElementById('quizContainer').innerHTML = `
      <div class="question-card" style="text-align:center">
        <div class="question-text">💾 عندك تقدم محفوظ!</div>
        <p style="color:#555;margin-bottom:24px">وصلت لسؤال ${saved.quizIndex + 1} من ${QUESTIONS.length} | النتيجة: ${saved.quizScore}</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn-restart" onclick="resumeQuiz()" style="background:linear-gradient(135deg,#2d6a4f,#1a3a2a)">▶️ كمّل من نفس المكان</button>
          <button class="btn-restart" onclick="initQuiz()" style="background:linear-gradient(135deg,#888,#555)">🔄 ابدأ من الأول</button>
        </div>
      </div>`;
    document.getElementById('quizBar').style.width = ((saved.quizIndex / QUESTIONS.length) * 100) + '%';
    document.getElementById('quizCounter').textContent = `سؤال ${saved.quizIndex + 1} من ${QUESTIONS.length} | النتيجة: ${saved.quizScore}`;
  } else {
    initQuiz();
  }
}

function resumeQuiz() {
  const saved = loadQuizProgress();
  if (saved) {
    quizIndex = saved.quizIndex;
    quizScore = saved.quizScore;
    quizAnswered = false;
    renderQuestion();
  }
}

function initQuiz() {
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  clearQuizProgress();
  renderQuestion();
}

function renderQuestion() {
  const total = QUESTIONS.length;
  if (quizIndex >= total) {
    showQuizResult();
    return;
  }
  document.getElementById('quizBar').style.width = ((quizIndex/total)*100) + '%';
  document.getElementById('quizCounter').textContent = `سؤال ${quizIndex+1} من ${total} | النتيجة: ${quizScore}`;
  const q = QUESTIONS[quizIndex];
  quizAnswered = false;
  document.getElementById('quizContainer').innerHTML = `
    <div class="question-card">
      <div class="question-text">❓ ${q.q}</div>
      <ul class="options-list">
        ${q.opts.map((o,i) => `<li class="option-item"><button class="option-btn" onclick="answerQuiz(${i})">${o}</button></li>`).join('')}
      </ul>
      <div class="explanation-box" id="expBox">💡 <strong>التفسير:</strong> ${q.exp}</div>
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()">السؤال التالي ←</button>
    </div>`;
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = QUESTIONS[quizIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx && idx !== q.ans) b.classList.add('wrong');
  });
  if (idx === q.ans) quizScore++;
  else { document.getElementById('expBox').classList.add('show'); }
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  quizIndex++;
  saveQuizProgress();
  renderQuestion();
}

function showQuizResult() {
  clearQuizProgress();
  const pct = Math.round((quizScore/QUESTIONS.length)*100);
  let msg = pct >= 90 ? '🏆 ممتاز! جاهز للامتحان' : pct >= 70 ? '👍 كويس! راجع النقاط الضعيفة' : '📚 راجع المنهج تاني';
  document.getElementById('quizContainer').innerHTML = `
    <div class="result-screen">
      <div class="result-score">${pct}%</div>
      <h3>${msg}</h3>
      <p>أجبت صح على ${quizScore} من ${QUESTIONS.length} سؤال</p>
      <button class="btn-restart" onclick="initQuiz()">🔄 حل تاني</button>
    </div>`;
  document.getElementById('quizBar').style.width = '100%';
}

// ==================== T/F ENGINE ====================
let tfIndex = 0, tfScore = 0, tfAnswered = false;

function saveTFProgress() {
  localStorage.setItem('tfProgress', JSON.stringify({ tfIndex, tfScore }));
}

function loadTFProgress() {
  const saved = localStorage.getItem('tfProgress');
  return saved ? JSON.parse(saved) : null;
}

function clearTFProgress() {
  localStorage.removeItem('tfProgress');
}

function openTF() {
  const saved = loadTFProgress();
  if (saved && saved.tfIndex > 0 && saved.tfIndex < TF_QUESTIONS.length) {
    document.getElementById('tfContainer').innerHTML = `
      <div class="question-card" style="text-align:center">
        <div class="question-text">💾 عندك تقدم محفوظ!</div>
        <p style="color:#555;margin-bottom:24px">وصلت لسؤال ${saved.tfIndex + 1} من ${TF_QUESTIONS.length} | النتيجة: ${saved.tfScore}</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn-restart" onclick="resumeTF()" style="background:linear-gradient(135deg,#2d6a4f,#1a3a2a)">▶️ كمّل من نفس المكان</button>
          <button class="btn-restart" onclick="initTF()" style="background:linear-gradient(135deg,#888,#555)">🔄 ابدأ من الأول</button>
        </div>
      </div>`;
    document.getElementById('tfBar').style.width = ((saved.tfIndex / TF_QUESTIONS.length) * 100) + '%';
    document.getElementById('tfCounter').textContent = `سؤال ${saved.tfIndex + 1} من ${TF_QUESTIONS.length} | النتيجة: ${saved.tfScore}`;
  } else {
    initTF();
  }
}

function resumeTF() {
  const saved = loadTFProgress();
  if (saved) {
    tfIndex = saved.tfIndex;
    tfScore = saved.tfScore;
    tfAnswered = false;
    renderTF();
  }
}

function initTF() {
  tfIndex = 0; tfScore = 0; tfAnswered = false;
  clearTFProgress();
  renderTF();
}

function renderTF() {
  const total = TF_QUESTIONS.length;
  if (tfIndex >= total) { showTFResult(); return; }
  document.getElementById('tfBar').style.width = ((tfIndex/total)*100) + '%';
  document.getElementById('tfCounter').textContent = `سؤال ${tfIndex+1} من ${total} | النتيجة: ${tfScore}`;
  const q = TF_QUESTIONS[tfIndex];
  tfAnswered = false;
  document.getElementById('tfContainer').innerHTML = `
    <div class="question-card">
      <div class="question-text">🤔 ${q.q}</div>
      <div class="tf-buttons">
        <button class="tf-btn true-btn" onclick="answerTF(true)">✅ صح</button>
        <button class="tf-btn false-btn" onclick="answerTF(false)">❌ غلط</button>
      </div>
      <div class="explanation-box" id="tfExpBox">💡 <strong>التفسير:</strong> ${q.exp}</div>
      <button class="btn-next" id="tfNextBtn" onclick="nextTF()">السؤال التالي ←</button>
    </div>`;
}

function answerTF(answer) {
  if (tfAnswered) return;
  tfAnswered = true;
  const q = TF_QUESTIONS[tfIndex];
  const trueBt = document.querySelector('.true-btn');
  const falseBt = document.querySelector('.false-btn');
  trueBt.disabled = true; falseBt.disabled = true;
  if (answer === q.ans) {
    tfScore++;
    (answer ? trueBt : falseBt).classList.add('correct');
  } else {
    (answer ? trueBt : falseBt).classList.add('wrong');
    (q.ans ? trueBt : falseBt).classList.add('correct');
    document.getElementById('tfExpBox').classList.add('show');
  }
  document.getElementById('tfNextBtn').classList.add('show');
}

function nextTF() {
  tfIndex++;
  saveTFProgress();
  renderTF();
}

function showTFResult() {
  clearTFProgress();
  const pct = Math.round((tfScore/TF_QUESTIONS.length)*100);
  let msg = pct >= 90 ? '🏆 ممتاز جداً!' : pct >= 70 ? '👍 كويس!' : '📚 راجع تاني';
  document.getElementById('tfContainer').innerHTML = `
    <div class="result-screen">
      <div class="result-score">${pct}%</div>
      <h3>${msg}</h3>
      <p>أجبت صح على ${tfScore} من ${TF_QUESTIONS.length} سؤال</p>
      <button class="btn-restart" onclick="initTF()">🔄 حل تاني</button>
    </div>`;
  document.getElementById('tfBar').style.width = '100%';
}
</script>
